interface:
  display_name: "Lecture Notes v2"
  short_description: "Turn a Bilibili / Douyin / TikTok / YouTube lecture into structured Chinese Markdown notes — with word-level transcription, speaker diarization, smart keyframes, slide OCR, and LLM writing."
  default_prompt: >
    Use this skill to convert a lecture video URL into high-quality Chinese lecture notes.
    Improvements over v1: WhisperX word-level timestamps + VAD, pyannote speaker diarization
    (distinguishes teacher vs. student), visual-change-based smart keyframe extraction,
    Marker/Surya slide text extraction, three-layer transcript–slide–topic alignment,
    and structured Markdown output generated by an LLM.
    Supports Bilibili, Douyin, TikTok, and YouTube.
